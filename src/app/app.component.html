<router-outlet></router-outlet>

<div
  *ngIf="showRouteLoading"
  class="fixed inset-0 z-[1000] flex items-center justify-center bg-white/70 dark:bg-slate-900/70 backdrop-blur-sm"
  role="status"
  aria-live="polite"
  aria-busy="true"
>
  <div class="flex flex-col items-center gap-4 px-6 text-center">
    <svg
      class="w-10 h-10 animate-spin text-slate-700 dark:text-slate-200"
      viewBox="0 0 24 24"
      fill="none"
      aria-hidden="true"
    >
      <circle
        class="opacity-25"
        cx="12"
        cy="12"
        r="10"
        stroke="currentColor"
        stroke-width="4"
      ></circle>
      <path
        class="opacity-75"
        fill="currentColor"
        d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"
      ></path>
    </svg>
    <div class="text-sm font-medium text-slate-700 dark:text-slate-100 tracking-wide">
      {{ "app.loading.title" | translate }}
    </div>
    <div class="text-xs text-slate-500 dark:text-slate-400">
      {{ "app.loading.subtitle" | translate }}
    </div>
  </div>
</div>
